name: Deploy playground to GitHub Pages

# Builds the engine to WebAssembly (Emscripten), builds the Vite playground
# against the workspace package, and publishes it to GitHub Pages. Enable Pages
# in repo Settings → Pages with "Source: GitHub Actions" for this to deploy.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer run cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules — the regex engine lives in third_party)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify toolchain
        run: emcc --version && node --version

      - name: Build the WebAssembly package (packages/lamassu-js/dist)
        run: make pkg

      - name: Install workspace dependencies
        run: npm ci

      - name: Build the Vite playground (web/dist)
        run: npm run build:web

      - name: Sanity-check the artifacts exist
        run: test -f web/dist/index.html && ls web/dist/assets/*.wasm

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
